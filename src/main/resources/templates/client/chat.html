
<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionStore AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }

        #chat-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 0;
            scroll-behavior: smooth;
        }

        .msg-user .bubble {
            background: #212529;
            color: #fff;
            border-radius: 18px 18px 4px 18px;
        }

        .msg-assistant .bubble {
            background: #fff;
            color: #212529;
            border: 1px solid #e9ecef;
            border-radius: 18px 18px 18px 4px;
        }

        .bubble {
            max-width: 75%;
            padding: .75rem 1rem;
            font-size: .95rem;
            line-height: 1.5;
            word-break: break-word;
        }

        /* ── Компактний markdown всередині bubble ── */
        .bubble p          { margin: 0 0 .25rem; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble ol,
        .bubble ul         { margin: .25rem 0; padding-left: 1.25rem; }
        .bubble li         { margin-bottom: .2rem; }
        .bubble li:last-child { margin-bottom: 0; }
        .bubble h1, .bubble h2,
        .bubble h3         { font-size: 1rem; font-weight: 600; margin: .3rem 0 .15rem; }
        .bubble strong     { font-weight: 600; }
        .bubble a          { color: inherit; font-weight: 600; }
        .msg-user .bubble a { color: #fff; }
        .bubble hr         { margin: .4rem 0; border-color: #e9ecef; }

        .agent-badge { font-size: .7rem; letter-spacing: .04em; }

        #input-area {
            border-top: 1px solid #e9ecef;
            background: #fff;
            padding: 1rem 0;
        }

        #user-input {
            border-radius: 12px;
            border: 1px solid #dee2e6;
            padding: .65rem 1rem;
            resize: none;
            font-size: .95rem;
            transition: border-color .2s;
        }

        #user-input:focus { border-color: #212529; box-shadow: none; }

        #send-btn {
            border-radius: 12px;
            width: 44px; height: 44px;
            padding: 0;
            background: #212529;
            border: none;
            color: #fff;
            transition: opacity .2s;
        }

        #send-btn:disabled { opacity: .4; }

        .typing-dot {
            width: 7px; height: 7px;
            background: #adb5bd;
            border-radius: 50%;
            animation: blink 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: .2s; }
        .typing-dot:nth-child(3) { animation-delay: .4s; }

        @keyframes blink {
            0%, 80%, 100% { transform: scale(.8); opacity: .4; }
            40% { transform: scale(1.1); opacity: 1; }
        }

        #summary-banner { font-size: .8rem; }
    </style>
</head>

<!-- Navbar -->
<nav class="navbar sticky-top px-3 py-2" style="background:#fff;border-bottom:1px solid #e9ecef;">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <div class="rounded-circle bg-dark d-flex align-items-center justify-content-center"
             style="width:32px;height:32px;flex-shrink:0">
            <i class="bi bi-stars text-white" style="font-size:.8rem;"></i>
        </div>
        <span style="font-weight:600;font-size:1rem;">FashionStore AI</span>
    </a>
    <div class="d-flex align-items-center gap-1">
        <a href="/"         class="nav-link" style="font-size:.875rem;color:#6c757d;padding:.4rem .75rem;border-radius:8px;">
            <i class="bi bi-house me-1"></i>Головна
        </a>
        <a href="/products" class="nav-link" style="font-size:.875rem;color:#6c757d;padding:.4rem .75rem;border-radius:8px;">
            <i class="bi bi-grid me-1"></i>Каталог
        </a>
        <a href="/chat"     class="nav-link active" style="font-size:.875rem;color:#212529;background:#f8f9fa;padding:.4rem .75rem;border-radius:8px;">
            <i class="bi bi-chat-dots me-1"></i>AI Чат
        </a>
        <a href="/cart"     class="nav-link position-relative" style="font-size:.875rem;color:#6c757d;padding:.4rem .75rem;border-radius:8px;">
            <i class="bi bi-bag me-1"></i>Кошик
        </a>
        <div class="d-flex gap-1 ms-2">
            <button onclick="clearHistory()"
                    class="btn btn-sm btn-outline-secondary rounded-pill"
                    title="Очистити історію">
                <i class="bi bi-trash3"></i>
            </button>
            <button onclick="resetSession()"
                    class="btn btn-sm btn-outline-danger rounded-pill"
                    title="Нова сесія">
                <i class="bi bi-arrow-counterclockwise"></i>
            </button>
        </div>
        <span class="badge bg-success-subtle text-success rounded-pill ms-1" style="font-size:.7rem;">
            <i class="bi bi-circle-fill me-1" style="font-size:.45rem;"></i>Online
        </span>
    </div>
</nav>

<div id="chat-wrapper" class="container-sm" style="max-width: 720px; height: calc(100vh - 57px); display: flex; flex-direction: column;">

    <!-- Summary banner -->
    <div th:if="${hasSummary}" id="summary-banner"
         class="text-center text-muted py-2 border-bottom bg-light">
        <i class="bi bi-clock-history me-1"></i>
        Довга сесія — частина розмови стиснута в резюме
    </div>

    <!-- Messages -->
    <div id="messages">

        <!-- Привітання -->
        <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted py-5">
            <i class="bi bi-bag-heart" style="font-size:2rem;"></i>
            <p class="mt-3 mb-1 fw-semibold">Привіт! Я допоможу знайти одяг</p>
            <p style="font-size:.85rem;">Скажи що шукаєш — категорію, колір, бренд або бюджет</p>
        </div>

        <!-- Існуючі повідомлення з БД -->
        <div th:each="msg : ${messages}"
             th:classappend="${msg.role == 'user'} ? 'msg-user justify-content-end' : 'msg-assistant justify-content-start'"
             class="d-flex mb-3 px-2">
            <div>
                <div th:if="${msg.role == 'assistant'}"
                     class="text-muted agent-badge mb-1 ms-1">
                    <i class="bi bi-cpu me-1"></i>
                    <span th:text="${msg.agentType != null ? msg.agentType : 'Assistant'}"></span>
                </div>
                <div class="bubble" th:utext="${msg.renderedContent}"></div>
                <div th:classappend="${msg.role == 'user'} ? 'text-end' : ''"
                     class="text-muted mt-1 px-1"
                     style="font-size:.7rem;"
                     th:text="${msg.createdAt != null ? msg.createdAt.toLocalTime().toString().substring(0,5) : ''}">
                </div>
            </div>
        </div>

    </div>

    <!-- Input area -->
    <div id="input-area">
        <div class="d-flex gap-2 align-items-end">
            <textarea id="user-input"
                      class="form-control flex-grow-1"
                      rows="1"
                      placeholder="Напиши що шукаєш..."
                      maxlength="2000"></textarea>
            <button id="send-btn" title="Надіслати">
                <i class="bi bi-arrow-up" style="font-size:1.1rem;"></i>
            </button>
        </div>
        <div class="text-muted text-end mt-1 px-1" style="font-size:.7rem;">
            Enter — надіслати · Shift+Enter — новий рядок
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Весь JS в окремому файлі — Thymeleaf не парсить його -->
<script src="/js/chat.js"></script>
</body>
</html>
