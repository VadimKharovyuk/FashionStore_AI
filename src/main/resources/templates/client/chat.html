<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionStore AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }

        #chat-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 0;
            scroll-behavior: smooth;
        }

        .msg-user .bubble {
            background: #212529;
            color: #fff;
            border-radius: 18px 18px 4px 18px;
        }

        .msg-assistant .bubble {
            background: #fff;
            color: #212529;
            border: 1px solid #e9ecef;
            border-radius: 18px 18px 18px 4px;
        }

        .bubble {
            max-width: 75%;
            padding: .75rem 1rem;
            font-size: .95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .agent-badge {
            font-size: .7rem;
            letter-spacing: .04em;
        }

        #input-area {
            border-top: 1px solid #e9ecef;
            background: #fff;
            padding: 1rem 0;
        }

        #user-input {
            border-radius: 12px;
            border: 1px solid #dee2e6;
            padding: .65rem 1rem;
            resize: none;
            font-size: .95rem;
            transition: border-color .2s;
        }

        #user-input:focus {
            border-color: #212529;
            box-shadow: none;
        }

        #send-btn {
            border-radius: 12px;
            width: 44px;
            height: 44px;
            padding: 0;
            background: #212529;
            border: none;
            color: #fff;
            transition: opacity .2s;
        }

        #send-btn:disabled { opacity: .4; }

        .typing-dot {
            width: 7px; height: 7px;
            background: #adb5bd;
            border-radius: 50%;
            animation: blink 1.2s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: .2s; }
        .typing-dot:nth-child(3) { animation-delay: .4s; }

        @keyframes blink {
            0%, 80%, 100% { transform: scale(.8); opacity: .4; }
            40% { transform: scale(1.1); opacity: 1; }
        }

        /* summary banner */
        #summary-banner { font-size: .8rem; }
    </style>
</head>
<body>

<div id="chat-wrapper" class="container-sm" style="max-width: 720px;">

    <!-- Header -->
    <div class="d-flex align-items-center gap-2 py-3 border-bottom bg-white sticky-top">
        <div class="rounded-circle bg-dark d-flex align-items-center justify-content-center"
             style="width:36px;height:36px;flex-shrink:0">
            <i class="bi bi-stars text-white" style="font-size:.9rem;"></i>
        </div>
        <div>
            <div class="fw-semibold" style="font-size:.95rem;">FashionStore AI</div>
            <div class="text-muted" style="font-size:.75rem;" id="agent-label">Shopping Assistant</div>
        </div>
        <div class="ms-auto">
            <span class="badge bg-success-subtle text-success rounded-pill" style="font-size:.7rem;">
                <i class="bi bi-circle-fill me-1" style="font-size:.45rem;"></i>Online
            </span>
        </div>
    </div>

    <!-- Summary banner (показуємо якщо є стиснутий контекст) -->
    <div th:if="${hasSummary}" id="summary-banner"
         class="text-center text-muted py-2 border-bottom bg-light">
        <i class="bi bi-clock-history me-1"></i>
        Довга сесія — частина розмови стиснута в резюме
    </div>

    <!-- Messages -->
    <div id="messages">

        <!-- Привітання якщо немає повідомлень -->
        <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted py-5">
            <i class="bi bi-bag-heart" style="font-size:2rem;"></i>
            <p class="mt-3 mb-1 fw-semibold">Привіт! Я допоможу знайти одяг</p>
            <p style="font-size:.85rem;">Скажи що шукаєш — категорію, колір, бренд або бюджет</p>
        </div>

        <!-- Існуючі повідомлення з БД -->
        <div th:each="msg : ${messages}"
             th:classappend="${msg.role == 'user'} ? 'msg-user justify-content-end' : 'msg-assistant justify-content-start'"
             class="d-flex mb-3 px-2">
            <div>
                <!-- Agent badge для assistant -->
                <div th:if="${msg.role == 'assistant'}"
                     class="text-muted agent-badge mb-1 ms-1">
                    <i class="bi bi-cpu me-1"></i>
                    <span th:text="${msg.agentType != null ? msg.agentType : 'Assistant'}"></span>
                </div>
                <div class="bubble" th:text="${msg.content}"></div>
                <div th:classappend="${msg.role == 'user'} ? 'text-end' : ''"
                     class="text-muted mt-1 px-1"
                     style="font-size:.7rem;"
                     th:text="${msg.createdAt != null ? msg.createdAt.toLocalTime().toString().substring(0,5) : ''}">
                </div>
            </div>
        </div>

    </div>

    <!-- Input area -->
    <div id="input-area">
        <div class="d-flex gap-2 align-items-end">
            <textarea id="user-input"
                      class="form-control flex-grow-1"
                      rows="1"
                      placeholder="Напиши що шукаєш..."
                      maxlength="2000"></textarea>
            <button id="send-btn" title="Надіслати">
                <i class="bi bi-arrow-up" style="font-size:1.1rem;"></i>
            </button>
        </div>
        <div class="text-muted text-end mt-1 px-1" style="font-size:.7rem;">
            Enter — надіслати · Shift+Enter — новий рядок
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const sessionId = [[${sessionId}]];
    const messages  = document.getElementById('messages');
    const input     = document.getElementById('user-input');
    const sendBtn   = document.getElementById('send-btn');

    // ── Auto-resize textarea ──────────────────────────────────────
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    });

    // ── Enter to send ─────────────────────────────────────────────
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });

    sendBtn.addEventListener('click', send);

    // ── Send ──────────────────────────────────────────────────────
    function send() {
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        input.value = '';
        input.style.height = 'auto';
        setLoading(true);

        const typingEl = appendTyping();
        streamResponse(text, typingEl);
    }

    // ── Fetch streaming (POST + ReadableStream) ───────────────────
    async function streamResponse(text, typingEl) {
        let bubbleEl = null;
        let rawText  = '';

        try {
            const res = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const reader  = res.body.getReader();
            const decoder = new TextDecoder();
            let buf = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buf += decoder.decode(value, { stream: true });
                const lines = buf.split('\n');
                buf = lines.pop();

                for (const line of lines) {
                    if (!line.startsWith('data:')) continue;
                    let chunk;
                    try { chunk = JSON.parse(line.substring(5)); } catch { continue; }

                    if (chunk.type === 'token') {
                        if (!bubbleEl) {
                            typingEl.remove();
                            bubbleEl = appendMessage('assistant', '');
                            setLoading(false);
                        }
                        rawText += chunk.content;
                        bubbleEl.querySelector('.bubble').innerHTML = renderMd(rawText);
                        scrollBottom();
                    } else if (chunk.type === 'error') {
                        typingEl.remove();
                        appendMessage('assistant', '⚠️ ' + chunk.content);
                        setLoading(false);
                    } else if (chunk.type === 'done') {
                        if (!bubbleEl) { typingEl.remove(); setLoading(false); }
                    }
                }
            }
        } catch (e) {
            typingEl.remove();
            appendMessage('assistant', '⚠️ Помилка з\'єднання. Спробуй ще раз.');
            setLoading(false);
        }
    }

    // ── Markdown рендер ───────────────────────────────────────────
    function renderMd(text) {
        return text
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/\n/g, '<br>');
    }

    // ── DOM helpers ───────────────────────────────────────────────
    function appendMessage(role, text) {
        const isUser = role === 'user';
        const wrap = document.createElement('div');
        wrap.className = `d-flex mb-3 px-2 ${isUser ? 'msg-user justify-content-end' : 'msg-assistant justify-content-start'}`;

        const now = new Date().toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'});

        wrap.innerHTML = `
            <div>
                ${!isUser ? `<div class="text-muted agent-badge mb-1 ms-1">
                    <i class="bi bi-cpu me-1"></i>Shopping Assistant</div>` : ''}
                <div class="bubble">${escHtml(text)}</div>
                <div class="text-muted mt-1 px-1 ${isUser ? 'text-end' : ''}"
                     style="font-size:.7rem;">${now}</div>
            </div>`;

        messages.appendChild(wrap);
        scrollBottom();
        return wrap;
    }

    function appendTyping() {
        const wrap = document.createElement('div');
        wrap.className = 'd-flex mb-3 px-2 msg-assistant justify-content-start';
        wrap.innerHTML = `
            <div>
                <div class="bubble d-flex align-items-center gap-1" style="min-width:56px;">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>`;
        messages.appendChild(wrap);
        scrollBottom();
        return wrap;
    }

    function setLoading(on) {
        sendBtn.disabled = on;
        input.disabled   = on;
    }

    function scrollBottom() {
        messages.scrollTop = messages.scrollHeight;
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Scroll вниз при завантаженні ──────────────────────────────
    scrollBottom();
</script>
</body>
</html>
