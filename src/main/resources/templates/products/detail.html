<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' — FashionStore AI'">Товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar { background: #fff; border-bottom: 1px solid #e9ecef; }
        .navbar-brand { font-weight: 600; font-size: 1rem; }

        /* ── Product image ── */
        .product-img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
            max-height: 480px;
        }

        /* ── Detail card ── */
        .detail-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 1.75rem;
        }
        .brand-label {
            font-size: .75rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: .06em;
        }
        .product-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: #212529;
            line-height: 1.3;
        }
        .price-main {
            font-size: 1.6rem;
            font-weight: 700;
            color: #212529;
        }
        .price-old {
            font-size: 1rem;
            color: #adb5bd;
            text-decoration: line-through;
        }
        .discount-badge {
            background: #dc3545;
            color: #fff;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: .75rem;
            font-weight: 600;
        }

        /* ── Size selector ── */
        .size-btn {
            width: 48px;
            height: 40px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: #fff;
            font-size: .8rem;
            font-weight: 500;
            color: #212529;
            cursor: pointer;
            transition: all .15s;
        }
        .size-btn:hover { border-color: #212529; }
        .size-btn.selected {
            background: #212529;
            color: #fff;
            border-color: #212529;
        }
        .size-btn.out-of-stock {
            color: #dee2e6;
            cursor: not-allowed;
            text-decoration: line-through;
        }

        /* ── Add to cart ── */
        .btn-cart {
            background: #212529;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: .8rem 1.5rem;
            font-size: .95rem;
            font-weight: 500;
            width: 100%;
            transition: opacity .2s;
        }
        .btn-cart:hover { opacity: .85; }
        .btn-cart:disabled { opacity: .4; cursor: not-allowed; }
        .btn-chat {
            border: 1px solid #212529;
            border-radius: 12px;
            padding: .8rem 1.5rem;
            font-size: .95rem;
            width: 100%;
            color: #212529;
            background: #fff;
            transition: all .15s;
        }
        .btn-chat:hover { background: #f8f9fa; }

        /* ── Info rows ── */
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: .5rem 0;
            border-bottom: 1px solid #f1f3f5;
            font-size: .875rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #6c757d; }
        .info-value { font-weight: 500; color: #212529; text-align: right; }

        /* ── Similar products ── */
        .similar-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            transition: box-shadow .2s, transform .2s;
        }
        .similar-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,.08);
            transform: translateY(-2px);
        }
        .similar-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .similar-card .sc-body { padding: .75rem; }
        .similar-card .sc-name {
            font-size: .8rem;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar sticky-top px-3 py-2 mb-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <div class="rounded-circle bg-dark d-flex align-items-center justify-content-center"
             style="width:32px;height:32px;flex-shrink:0">
            <i class="bi bi-stars text-white" style="font-size:.8rem;"></i>
        </div>
        FashionStore AI
    </a>
    <div class="d-flex gap-2">
        <a href="/products" class="btn btn-sm btn-outline-dark rounded-pill">
            <i class="bi bi-arrow-left me-1"></i>Каталог
        </a>
        <a href="/chat" class="btn btn-sm btn-dark rounded-pill">
            <i class="bi bi-chat me-1"></i>AI Чат
        </a>
    </div>
</nav>

<div class="container-lg pb-5">

    <!-- Breadcrumb -->
    <nav class="mb-3">
        <ol class="breadcrumb" style="font-size:.8rem;">
            <li class="breadcrumb-item"><a href="/products" class="text-muted text-decoration-none">Каталог</a></li>
            <li class="breadcrumb-item text-muted"
                th:text="${product.category}">Категорія</li>
            <li class="breadcrumb-item active"
                th:text="${product.name}">Товар</li>
        </ol>
    </nav>

    <div class="row g-4">

        <!-- ── Image ── -->
        <div class="col-12 col-md-5">
            <img th:src="${product.imageUrl}"
                 th:alt="${product.name}"
                 class="product-img"
                 onerror="this.src='https://via.placeholder.com/480x480?text=No+Image'">
        </div>

        <!-- ── Details ── -->
        <div class="col-12 col-md-7">
            <div class="detail-card">

                <!-- Brand + badges -->
                <div class="d-flex align-items-center gap-2 mb-1">
                    <span class="brand-label" th:text="${product.brand}">Brand</span>
                    <span th:if="${product.isNew}"
                          class="badge bg-dark rounded-pill" style="font-size:.65rem;">NEW</span>
                    <span th:if="${product.isBestseller}"
                          class="badge bg-light text-dark border rounded-pill" style="font-size:.65rem;">
                        <i class="bi bi-star-fill me-1" style="font-size:.55rem;"></i>ХІТ
                    </span>
                </div>

                <!-- Name -->
                <div class="product-name mb-3" th:text="${product.name}">Назва</div>

                <!-- Price -->
                <div class="d-flex align-items-center gap-2 mb-4">
                    <span class="price-main"
                          th:text="'$' + ${product.discountedPrice}">$0</span>
                    <span th:if="${product.discountPercent > 0}"
                          class="price-old"
                          th:text="'$' + ${product.price}">$0</span>
                    <span th:if="${product.discountPercent > 0}"
                          class="discount-badge"
                          th:text="'-' + ${product.discountPercent} + '%'">-0%</span>
                </div>

                <!-- Sizes -->
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span style="font-size:.875rem; font-weight:500;">Розмір</span>
                        <span id="size-hint" class="text-muted" style="font-size:.75rem;">
                            Оберіть розмір
                        </span>
                    </div>
                    <div class="d-flex gap-2 flex-wrap" id="size-selector">
                        <button th:each="entry : ${product.availableSizes}"
                                th:text="${entry.key}"
                                th:data-size="${entry.key}"
                                th:data-stock="${entry.value}"
                                class="size-btn"
                                onclick="selectSize(this)">
                        </button>
                    </div>
                    <div th:if="${#maps.isEmpty(product.availableSizes)}"
                         class="text-muted mt-2" style="font-size:.8rem;">
                        <i class="bi bi-x-circle me-1"></i>Немає в наявності
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-grid gap-2 mb-4">
                    <button id="btn-add-cart" class="btn-cart" disabled
                            th:data-product-id="${product.id}"
                            onclick="addToCart()">
                        <i class="bi bi-bag-plus me-2"></i>Додати в кошик
                    </button>
                    <a th:href="@{/chat}" class="btn-chat text-decoration-none text-center">
                        <i class="bi bi-chat-dots me-2"></i>Запитати AI про цей товар
                    </a>
                </div>

                <!-- Info table -->
                <div>
                    <div class="info-row" th:if="${product.material != null}">
                        <span class="info-label">Матеріал</span>
                        <span class="info-value" th:text="${product.material}"></span>
                    </div>
                    <div class="info-row" th:if="${product.fabricComposition != null}">
                        <span class="info-label">Склад</span>
                        <span class="info-value" th:text="${product.fabricComposition}"></span>
                    </div>
                    <div class="info-row" th:if="${product.fitType != null}">
                        <span class="info-label">Крій</span>
                        <span class="info-value" th:text="${product.fitType}"></span>
                    </div>
                    <div class="info-row" th:if="${product.season != null}">
                        <span class="info-label">Сезон</span>
                        <span class="info-value" th:text="${product.season}"></span>
                    </div>
                    <div class="info-row" th:if="${product.countryOfOrigin != null}">
                        <span class="info-label">Виробництво</span>
                        <span class="info-value" th:text="${product.countryOfOrigin}"></span>
                    </div>
                    <div class="info-row" th:if="${product.careInstructions != null}">
                        <span class="info-label">Догляд</span>
                        <span class="info-value" style="max-width:60%;"
                              th:text="${product.careInstructions}"></span>
                    </div>
                    <div class="info-row" th:if="${product.styleNotes != null}">
                        <span class="info-label">Нотатки</span>
                        <span class="info-value" style="max-width:60%;"
                              th:text="${product.styleNotes}"></span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ── Similar products ── -->
    <div th:if="${not #lists.isEmpty(similar)}" class="mt-5">
        <div class="fw-semibold mb-3">Схожі товари</div>
        <div class="row g-3">
            <div class="col-6 col-md-3" th:each="p : ${similar}">
                <a th:href="@{/products/{id}(id=${p.id})}" class="text-decoration-none">
                    <div class="similar-card">
                        <img th:src="${p.imageUrl}" th:alt="${p.name}"
                             onerror="this.src='https://via.placeholder.com/200x160'">
                        <div class="sc-body">
                            <div class="text-muted" style="font-size:.7rem;"
                                 th:text="${p.brand}"></div>
                            <div class="sc-name text-dark" th:text="${p.name}"></div>
                            <div class="fw-semibold mt-1" style="font-size:.875rem;"
                                 th:text="'$' + ${p.discountedPrice}"></div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast align-items-center border-0 rounded-pill px-3"
         role="alert" aria-live="assertive">
        <div class="d-flex">
            <div class="toast-body" id="toast-msg">Додано в кошик</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let selectedSize = null;
    const btnCart    = document.getElementById('btn-add-cart');
    const sizeHint   = document.getElementById('size-hint');
    const productId  = btnCart.dataset.productId;

    function selectSize(btn) {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedSize = btn.dataset.size;
        const stock  = btn.dataset.stock;
        sizeHint.textContent = `В наявності: ${stock} шт.`;
        btnCart.disabled = false;
    }

    async function addToCart() {
        if (!selectedSize) return;
        btnCart.disabled = true;
        btnCart.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Додаємо...';

        try {
            const res = await fetch('/api/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    productId: parseInt(productId),
                    size: selectedSize,
                    quantity: 1
                })
            });

            if (res.ok) {
                showToast('✅ Додано в кошик!', 'bg-dark text-white');
            } else {
                const err = await res.json();
                showToast('❌ ' + (err.message || 'Помилка'), 'bg-danger text-white');
            }
        } catch (e) {
            showToast('❌ Помилка з\'єднання', 'bg-danger text-white');
        } finally {
            btnCart.disabled = false;
            btnCart.innerHTML = '<i class="bi bi-bag-plus me-2"></i>Додати в кошик';
        }
    }

    function showToast(msg, cls) {
        const toast    = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');
        toast.className = `toast align-items-center border-0 rounded-pill px-3 ${cls}`;
        toastMsg.textContent = msg;
        new bootstrap.Toast(toast, { delay: 2500 }).show();
    }
</script>
</body>
</html>
