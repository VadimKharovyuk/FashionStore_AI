spring.application.name=FashionStore_AI
server.port=1430

# ============================================================
# DATABASE (PostgreSQL)
# ============================================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/FashionStore_AI}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:19111993}

# HikariCP  async processing
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=30000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


# ????????? ?????????? OpenAI ??????
spring.ai.openai.audio.speech.enabled=false
spring.ai.openai.audio.transcription.enabled=false
spring.ai.openai.image.enabled=false

# ???????? ?????????????? Ollama
spring.profiles.active=local

# OpenAI/OpenRouter ? ???????? ??? ????????? ????????
spring.ai.openai.api-key=not-used-locally
spring.ai.openai.base-url=https://openrouter.ai/api/v1